<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎭 Playwright Trainer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- ===== Header ===== -->
  <header>
    <div class="header-inner">
      <span class="logo">🎭 Playwright Trainer</span>
      <span id="status-badge" class="badge badge-idle">● Idle</span>
    </div>
  </header>

  <main>
    <!-- ===== LEFT — Recording Panel ===== -->
    <section class="panel" id="panel-record">
      <h2>📹 Recording</h2>

      <div class="field-row">
        <label for="start-url">Start URL</label>
        <input id="start-url" type="url" placeholder="https://example.com" value="" />
      </div>

      <div class="btn-row">
        <button id="btn-start" class="btn btn-primary" title="Start a new recording session">
          ▶ Start Recording
        </button>
        <button id="btn-stop" class="btn btn-danger" disabled title="Stop the current session">
          ⏹ Stop &amp; Save
        </button>
      </div>

      <div class="divider"></div>

      <h3>Live Actions <span id="action-count" class="count-badge">0</span></h3>
      <div id="action-log" class="log-box" aria-live="polite" aria-label="Recorded actions"></div>

      <div class="divider"></div>

      <h3>Server Log</h3>
      <div id="server-log" class="log-box log-box--sm" aria-live="polite" aria-label="Server log"></div>
    </section>

    <!-- ===== RIGHT — Scripts Panel ===== -->
    <section class="panel" id="panel-scripts">
      <h2>📂 Saved Scripts</h2>
      <button id="btn-refresh" class="btn btn-secondary btn-sm">↻ Refresh</button>
      <div id="scripts-list" class="scripts-list" aria-label="Saved scripts"></div>

      <div class="divider"></div>

      <!-- Run panel -->
      <h2>▶ Run Script</h2>
      <div class="field-row">
        <label for="run-script-name">Script</label>
        <select id="run-script-name">
          <option value="">— select a script —</option>
        </select>
      </div>

      <div class="field-row">
        <label for="run-params">
          Params (JSON)
          <span class="hint">e.g. <code>{"startDate":"2024-01"}</code></span>
        </label>
        <textarea id="run-params" rows="3" placeholder='{"startDate": "2024-01-01"}'></textarea>
      </div>

      <div class="field-row">
        <label for="loop-params">
          Loop Params (JSON array)
          <span class="hint">leave empty for a single run</span>
        </label>
        <textarea id="loop-params" rows="4"
          placeholder='[{"startDate":"2024-01"},{"startDate":"2024-02"}]'></textarea>
      </div>

      <div class="btn-row">
        <button id="btn-run" class="btn btn-primary">▶ Run</button>
        <button id="btn-view-script" class="btn btn-secondary">🔍 View Script</button>
      </div>

      <div class="divider"></div>
      <h3>Run Log</h3>
      <div id="run-log" class="log-box" aria-live="polite" aria-label="Run log"></div>
    </section>
  </main>

  <!-- ===== Save Modal ===== -->
  <div id="modal-save" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
    <div class="modal-box">
      <h2 id="modal-title">💾 Save Recording</h2>
      <p><strong id="modal-action-count"></strong> recorded.</p>

      <div class="field-row">
        <label for="script-name">Script Name <span class="required">*</span></label>
        <input id="script-name" type="text" placeholder="e.g. login_and_download_vat"
          pattern="[a-zA-Z0-9_\-]+" maxlength="80" required />
      </div>

      <!-- Parameter configuration -->
      <div id="param-config-area">
        <h3>Parameters (optional)</h3>
        <p class="hint">Mark fill values that should be variable between runs. Useful for loops.</p>
        <div id="param-list"></div>
        <button type="button" class="btn btn-secondary btn-sm" id="btn-add-param">+ Add Parameter</button>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-primary" id="btn-save-confirm">💾 Save Script</button>
        <button type="button" class="btn btn-secondary" id="btn-save-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ===== Script Viewer Modal ===== -->
  <div id="modal-view" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-view-title" hidden>
    <div class="modal-box modal-box--wide">
      <h2 id="modal-view-title">🔍 Script Source</h2>
      <pre id="script-source-code"></pre>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btn-view-close">Close</button>
      </div>
    </div>
  </div>

  <div id="modal-overlay" class="modal-overlay" hidden></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
